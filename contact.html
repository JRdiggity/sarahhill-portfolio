  <section class="contact" id="contact" style="padding-top:calc(var(--nav-h) + 60px);min-height:100vh;display:flex;align-items:center">
    <div class="contact__inner">
      <div class="contact__tag-wrap" data-reveal><span class="tag tag--light">Get In Touch</span></div>
      <h2 class="contact__heading" data-reveal data-delay="1">Let&rsquo;s build something<br />learners <em>remember.</em></h2>
      <p class="contact__intro" data-reveal data-delay="2">Whether you need a full course build, a curriculum framework, or a quick consultation on your L&amp;D strategy &mdash; I&rsquo;d love to hear about it.</p>
      <form class="cform" data-reveal data-delay="3" action="https://formspree.io/f/xaqppyyp" method="POST">
        <div class="cform__row">
          <div class="cform__field"><label for="fn">First Name</label><input type="text" id="fn" name="firstName" placeholder="Jane" required /></div>
          <div class="cform__field"><label for="ln">Last Name</label><input type="text" id="ln" name="lastName" placeholder="Smith" required /></div>
        </div>
        <div class="cform__field"><label for="co">Company</label><input type="text" id="co" name="company" placeholder="Acme Corp" required /></div>
        <div class="cform__field"><label for="em">Email</label><input type="email" id="em" name="email" placeholder="jane@company.com" required /></div>
        <div class="cform__field"><label for="msg">Message</label><textarea id="msg" name="message" placeholder="Tell me about your training needs..." required></textarea></div>
        <div class="cform__submit"><button type="submit">Send Message</button></div>
      </form>
      <div class="contact__social" data-reveal data-delay="4">
        <a href="/cdn-cgi/l/email-protection#c3b0a2b1a2abafb5a2ada8aab1a883a4aea2aaafeda0acae" class="btn btn--ghost btn--sm"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg> Email</a>
        <a href="https://www.linkedin.com/in/sarah-hill-33080b126" target="_blank" rel="noopener" class="btn btn--ghost btn--sm"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66z"/></svg> LinkedIn</a>
